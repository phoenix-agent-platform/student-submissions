name: PR Mentor Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-review:
    runs-on: self-hosted
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ACR_API_KEY: ${{ secrets.ACR_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run PR-Agent review
        env:
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '[config]\nmodel = "gemini/gemini-2.0-flash"\nfallback_models = []\n' > /tmp/pr_agent_secrets.toml
          docker run --rm \
            -v /tmp/pr_agent_secrets.toml:/usr/local/lib/python3.12/site-packages/pr_agent/settings/.secrets.toml \
            -e GEMINI_API_KEY="$GEMINI_API_KEY" \
            -e GITHUB__USER_TOKEN="$GITHUB__USER_TOKEN" \
            ghcr.io/oai-labs/pr-agent:latest \
            --pr_url ${{ github.event.pull_request.html_url }} review

      - name: Send grade to ACR API
        run: |
          curl -s -X POST "https://github.webhooks.note.transformerlabs.ai/api/grades/pr-review" \
            -H "Authorization: Bearer $ACR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": ${{ github.event.pull_request.number }}, \"repository\": \"${{ github.repository }}\"}"
